<h1>🛟 Safety Guide</h1>

<h3>🌪 During Disaster</h3>
<ul>
    <li>Stay calm</li>
    <li>Follow official instructions</li>
    <li>Move to safe area</li>
</ul>

<h3>🔥 Fire Safety</h3>
<ul>
    <li>Do not use lifts</li>
    <li>Call fire emergency 101</li>
</ul>

<h3>🌊 Flood Safety</h3>
<ul>
    <li>Move to higher ground</li>
    <li>Avoid walking in water</li>
</ul>

</body>
